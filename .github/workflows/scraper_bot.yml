name: Motore di Scouting (Playwright)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 3 * * 1,4' 

jobs:
  scout-immobili:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@main

      - name: Installa Python
        uses: actions/setup-python@main
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright
          playwright install chromium

      - name: Esegui Scraper
        run: python scraper.py

      - name: Salva il nuovo Database su GitHub
        run: |
          git config --global user.name "GECO Scraper Bot"
          git config --global user.email "bot@geco.local"
          
          # Controlla se il file esiste prima di fare il commit
          if test -f "annunci_padova.csv"; then
            echo "File trovato. Procedo al salvataggio..."
            git add annunci_padova.csv
            git commit -m "Aggiornamento Database Immobili Padova" || echo "Nessun dato variato"
            git push
          else
            echo "ATTENZIONE: Il file annunci_padova.csv non è stato creato. Possibile blocco anti-bot o nessun annuncio trovato."
          fi
