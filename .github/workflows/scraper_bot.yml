name: Motore di Scouting (Playwright)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 3 * * 1,4' 

jobs:
  scout-immobili:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@main

      - name: Installa Python
        uses: actions/setup-python@main
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright
          playwright install chromium

      - name: Esegui Scraper
        run: python scraper.py

      - name: Salva il nuovo Database su GitHub
        run: |
          git config --global user.name "GECO Scraper Bot"
          git config --global user.email "bot@geco.local"
          
          # Verifica se ci sono state modifiche ai file tracciati o se ci sono file non tracciati
          if [[ -n $(git status -s) ]]; then
            echo "Modifiche rilevate. Procedo al salvataggio..."
            # Aggiunge tutti i file modificati o nuovi nella directory corrente
            git add -A
            git commit -m "Aggiornamento Database Immobili Padova"
            git push
          else
            echo "Nessun dato variato o file CSV non creato. Skip del commit."
          fi
