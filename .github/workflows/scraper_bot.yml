name: Motore di Scouting (Playwright)

on:
  workflow_dispatch: # Questo ti permette di avviare lo scraper manualmente con un clic!
  schedule:
    - cron: '0 3 * * 1,4' # Avvio automatico ogni Lunedì e Giovedì alle 3:00 di notte

jobs:
  scout-immobili:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright
          playwright install chromium

      - name: Esegui Scraper
        run: python scraper.py

      - name: Salva il nuovo Database su GitHub
        run: |
          git config --global user.name "GECO Scraper Bot"
          git config --global user.email "bot@geco.local"
          git add annunci_padova.csv
          git commit -m "Aggiornamento Database Immobili Padova" || echo "Nessun nuovo dato da salvare"
          git push
