name: Motore di Scouting (Playwright)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 3 * * 1,4' 

jobs:
  scout-immobili:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@main

      - name: Installa Python
        uses: actions/setup-python@main
        with:
          python-version: '3.11'

      - name: Installa dipendenze e librerie di sistema Ubuntu
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright
          playwright install chromium
          playwright install-deps

      - name: Esegui Scraper
        run: python scraper.py

      - name: Forza la creazione del file (Antipanico)
        run: |
          if [ ! -f annunci_padova.csv ]; then
            echo "Comune,Zona,Tipologia,Superficie,Prezzo_J,Link,Fonte" > annunci_padova.csv
            echo "Padova (Forzato),Errore di Sistema,Residenziale,100,100000,https://github.com,Sistema" >> annunci_padova.csv
          fi

      - name: Rilascia il Database CSV come File Zip
        uses: actions/upload-artifact@v4
        with:
          name: database-immobili-padova
          path: annunci_padova.csv
