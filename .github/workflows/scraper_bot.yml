name: Motore di Scouting (Playwright)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 3 * * 1,4' 

jobs:
  scout-immobili:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@main

      - name: Installa Python
        uses: actions/setup-python@main
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright
          playwright install chromium

      - name: Esegui Scraper
        run: python scraper.py

      # QUESTA È LA SOLUZIONE GARANTITA
      # Invece di provare a modificare i tuoi file su GitHub (che causa l'errore 128),
      # carichiamo il file come "Artefatto" scaricabile alla fine del processo.
      - name: Rilascia il Database CSV
        uses: actions/upload-artifact@v4
        with:
          name: database-immobili-padova
          path: annunci_padova.csv
